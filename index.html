<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My London Crew: The Album</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🇬🇧 THE LONDON CREW 🇬🇧</h1>
        <p>An interactive album for [Your Friend's Name]!</p>
    </header>

    <div class="album-grid">

        <div class="card-container" id="card-sarah">
            <div class="card-flip-inner">
                
                <div class="card-front">
                    <img src="path/to/sarah-front.jpg" alt="Sarah J.">
                    <h3>Sarah Jenkins</h3>
                </div>

                <div class="card-back">
                    <button class="close-btn">&times;</button>
                    <h2>Sarah Jenkins</h2>
                    <p>Sarah and I met... She's an architect...</p>
                    <img src="path/to/sarah-back.jpg" alt="Sarah and me at [Pub Name]">
                </div>

            </div>
        </div>
        </div>

    <script src="script.js"></script>
</body>
</html>
